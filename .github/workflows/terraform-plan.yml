name: Terraform CI (Validate & Plan)

# Runs on pull requests and pushes to main.
# Validates Terraform formatting, syntax, and optionally runs a plan.
# Does NOT apply any infrastructure changes.

on:
  push:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'bootstrap/**'
      - '.github/workflows/terraform-plan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'bootstrap/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Terraform Validate & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Format Check
        run: |
          set -euo pipefail
          terraform fmt -check -recursive
          echo "Terraform formatting check passed."

      - name: Terraform Init (validation only, no backend)
        working-directory: environments/dev
        run: |
          set -euo pipefail
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/dev
        run: |
          set -euo pipefail
          terraform validate
          echo "Terraform validate passed."

      - name: Terraform Init (bootstrap, no backend)
        working-directory: bootstrap
        run: |
          set -euo pipefail
          terraform init -backend=false

      - name: Terraform Validate (bootstrap)
        working-directory: bootstrap
        run: |
          set -euo pipefail
          terraform validate
          echo "Bootstrap validate passed."

  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
          download_external_modules: true

  plan:
    name: Terraform Plan (requires AWS credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    # Plan only runs when AWS credentials are available (i.e., not on fork PRs)
    # Skip gracefully on pull_request from forks where secrets are unavailable
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS credentials available
        id: check-creds
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "AWS credentials not available. Skipping plan step."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        if: steps.check-creds.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        if: steps.check-creds.outputs.skip == 'false'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.check-creds.outputs.skip == 'false'
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Plan
        if: steps.check-creds.outputs.skip == 'false'
        working-directory: environments/dev
        run: |
          set -euo pipefail
          terraform plan -no-color -out=tfplan
        continue-on-error: true
        id: plan

      - name: Comment Plan on PR
        if: >
          github.event_name == 'pull_request' &&
          steps.check-creds.outputs.skip == 'false'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan
            **Status:** ${{ steps.plan.outcome }}

            <details><summary>Show Plan</summary>

            Run the workflow to see full plan output.
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
